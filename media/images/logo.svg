<svg xmlns="http://www.w3.org/2000/svg" width="560" height="140" viewBox="0 0 560 140" role="img" aria-label="Movie Listings">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="reel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Icon: clapperboard -->
  <g transform="translate(20,24)">
    <rect x="0" y="22" width="92" height="70" rx="8" fill="url(#bg)"/>
    <!-- clapper top -->
    <g transform="rotate(-8 4 22)">
      <rect x="-2" y="6" width="100" height="22" rx="5" fill="#1f2937"/>
      <polygon points="6,8 18,8 10,26 -2,26" fill="#f9fafb"/>
      <polygon points="26,8 38,8 30,26 18,26" fill="#f9fafb"/>
      <polygon points="46,8 58,8 50,26 38,26" fill="#f9fafb"/>
      <polygon points="66,8 78,8 70,26 58,26" fill="#f9fafb"/>
      <polygon points="86,8 98,8 90,26 78,26" fill="#f9fafb"/>
    </g>
    <!-- play triangle -->
    <polygon points="38,44 38,82 70,63" fill="url(#reel)"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(132,0)" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
    <text x="0" y="72" font-size="44" font-weight="700" fill="#ffffff">Movie</text>
    <text x="138" y="72" font-size="44" font-weight="700" fill="url(#reel)">Listings</text>
    <text x="2" y="104" font-size="18" font-weight="500" fill="#c4b5fd" letter-spacing="3">FOR FILM FESTIVALS</text>
  </g>
</svg>
